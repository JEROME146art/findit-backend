services:
  - type: web
    name: findit-backend
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: findit-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: findit-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: findit-db
          property: password

databases:
  - name: findit-db
    plan: free
    databaseName: finditdb
    user: findit_user