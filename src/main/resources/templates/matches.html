<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>My Matches - FindIt</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    body { background: #f5f6fa; }
    .match-card { border-left: 5px solid #6c5ce7; transition: transform 0.3s; }
    .match-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .score-badge { font-size: 1.2rem; padding: 8px 16px; }
    .score-strong { background: linear-gradient(135deg, #00b894, #00cec9); color: white; }
    .score-moderate { background: linear-gradient(135deg, #fdcb6e, #f39c12); color: white; }
    .score-weak { background: linear-gradient(135deg, #b2bec3, #636e72); color: white; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/dashboard"><i class="bi bi-search"></i> FindIt</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="/report">Report Item</a></li>
        <li class="nav-item"><a class="nav-link active" href="/matches">My Matches</a></li>
        <li class="nav-item"><a class="nav-link" href="/browse">Browse Items</a></li>
      </ul>
      <button class="btn btn-outline-light btn-sm" onclick="logout()">
        <i class="bi bi-box-arrow-right"></i> Logout
      </button>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <h1><i class="bi bi-stars"></i> My Match Results</h1>
  <p class="text-muted">Smart matches for your lost items, ranked by our algorithm.</p>

  <div id="loadingBox" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2">Finding matches...</p>
  </div>

  <div id="matchesContainer"></div>
</div>

<script>
  const token = localStorage.getItem('token');
  if (!token) window.location.href = '/login';

  function logout() {
    localStorage.clear();
    window.location.href = '/';
  }

  async function loadMatches() {
    try {
      // 1. Get all lost items
      const lostRes = await fetch('/api/items/lost', {
        headers: {'Authorization': 'Bearer ' + token}
      });
      const lostItems = await lostRes.json();

      const container = document.getElementById('matchesContainer');
      document.getElementById('loadingBox').style.display = 'none';

      if (lostItems.length === 0) {
        container.innerHTML = `<div class="alert alert-info">
                    <i class="bi bi-info-circle"></i> You haven't reported any lost items yet.
                    <a href="/report">Report one now</a>
                </div>`;
        return;
      }

      // 2. For each lost item, find matches
      let html = '';
      for (const lost of lostItems) {
        const matchRes = await fetch(`/api/matches/lost/${lost.id}?threshold=30`, {
          headers: {'Authorization': 'Bearer ' + token}
        });
        const matches = await matchRes.json();

        html += `<div class="card mb-4">
                    <div class="card-header bg-danger text-white">
                        <h5 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Lost: ${lost.title}</h5>
                    </div>
                    <div class="card-body">
                        <p class="text-muted small">${lost.description || 'No description'}</p>`;

        if (matches.length === 0) {
          html += `<p class="text-muted">😔 No matches found yet. Check back later!</p>`;
        } else {
          html += `<h6 class="mt-3">🎯 ${matches.length} potential match(es):</h6>`;
          for (const m of matches) {
            const scoreClass = m.matchLevel === 'STRONG' ? 'score-strong' :
                    m.matchLevel === 'MODERATE' ? 'score-moderate' : 'score-weak';
            html += `<div class="match-card card p-3 my-2">
                            <div class="row align-items-center">
                                <div class="col-md-9">
                                    <h6 class="mb-1">${m.foundTitle}</h6>
                                    <p class="text-muted small mb-1">${m.foundDescription}</p>
                                    <p class="text-muted small mb-0"><i class="bi bi-geo-alt"></i> ${m.foundLocation}</p>
                                </div>
                                <div class="col-md-3 text-end">
                                    <span class="badge score-badge ${scoreClass}">${m.score.toFixed(1)}%</span>
                                    <p class="small mt-1 mb-0">${m.matchLevel} MATCH</p>
                                </div>
                            </div>
                        </div>`;
          }
        }
        html += `</div></div>`;
      }
      container.innerHTML = html;
    } catch (err) {
      document.getElementById('loadingBox').style.display = 'none';
      document.getElementById('matchesContainer').innerHTML =
              `<div class="alert alert-danger">Failed to load matches</div>`;
    }
  }

  loadMatches();
</script>

</body>
</html>
