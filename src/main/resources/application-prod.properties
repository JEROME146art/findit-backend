# ==============================
# PRODUCTION Configuration
# Used when deployed on Render
# ==============================

spring.application.name=findit-backend
server.port=${PORT:8080}

# ==============================
# PostgreSQL Database (from Render environment variables)
# ==============================
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# ==============================
# JPA / Hibernate for PostgreSQL
# ==============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ==============================
# Disable H2 Console in production
# ==============================
spring.h2.console.enabled=false

# ==============================
# Logging
# ==============================
logging.level.org.springframework=WARN
logging.level.com.findit=INFO

# ==============================
# JWT Configuration (use environment variable for secret in production)
# ==============================
app.jwt.secret=${JWT_SECRET:mySuperSecretKeyForFindItAppJWTTokenGeneration1234567890ABCDEFGHIJKLMNOP}
app.jwt.expiration=86400000

# ==============================
# Thymeleaf Configuration
# ==============================
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ==============================
# Disable DevTools
# ==============================
spring.devtools.restart.enabled=false