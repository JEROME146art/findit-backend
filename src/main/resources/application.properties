# ==============================
# Application Config
# ==============================
spring.application.name=findit-backend
server.port=8080

# ==============================
# H2 Database (File-based - persists across restarts)
# ==============================
spring.datasource.url=jdbc:h2:file:~/finditdb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==============================
# JPA / Hibernate Config
# ==============================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==============================
# Logging
# ==============================
logging.level.org.springframework=INFO
logging.level.com.findit=DEBUG

# ==============================
# JWT Configuration
# ==============================
app.jwt.secret=mySuperSecretKeyForFindItAppJWTTokenGeneration1234567890ABCDEFGHIJKLMNOP
app.jwt.expiration=86400000

# ==============================
# Thymeleaf Configuration
# ==============================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ==============================
# DevTools - Disable auto-restart (prevents data loss during dev)
# ==============================
spring.devtools.restart.enabled=false
# Fix Jackson Hibernate lazy-loading issue
spring.jackson.serialization.fail-on-empty-beans=false